version: '3.9'

services:
  evolution:
    image: atendai/evolution-api:latest
    container_name: evolution_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      AUTHENTICATION_API_KEY: "sua-chave-api-aqui"
      SERVER_URL: "http://localhost:8080"
      CORS_ORIGIN: "*"
    volumes:
      - ./evolution_instances:/evolution/instances
