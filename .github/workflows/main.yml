name: Deploy CP Review to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install NPM Dependencies & Build
        run: |
          npm install
          npm run build

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Deploy to Server via SSH (Direct)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p ${{ secrets.PROD_PATH }}
      
      - name: SCP Transfer
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "."
          target: "${{ secrets.PROD_PATH }}"
          rm: false
          strip_components: 0

      - name: Run Remote Commands (Migrate & Permissions)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.PROD_PATH }}

            # Garantir permissões de escrita
            chmod -R 775 storage bootstrap/cache
            chown -R www-data:www-data storage bootstrap/cache

            # Comandos Laravel
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link --force || true

            # ── Rclone: instalar se não estiver presente ──────────────────
            if ! command -v rclone &> /dev/null; then
              echo "Instalando rclone..."
              curl -fsSL https://rclone.org/install.sh | bash
            fi

            # Tornar o script de backup executável
            chmod +x ${{ secrets.PROD_PATH }}/backup.sh

            # Registrar cron diário às 02:00 (idempotente)
            CRON_JOB="0 2 * * * ${{ secrets.PROD_PATH }}/backup.sh >> /var/log/cpreview-backup.log 2>&1"
            (crontab -l 2>/dev/null | grep -v "backup.sh"; echo "$CRON_JOB") | crontab -


